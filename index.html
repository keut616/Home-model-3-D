<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ແບບຈຳລອງ 3 ມິຕິ ເຮືອນໂມເດີນ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Noto Sans Lao', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #87CEEB; display: flex; justify-content: center; align-items: center;
            z-index: 100; color: white; font-size: 24px; font-weight: bold; flex-direction: column;
        }
        .spinner {
            border: 6px solid rgba(255,255,255,0.3); border-top: 6px solid white;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div>ກຳລັງໂຫຼດແບບຈຳລອງ 3 ມິຕິ...</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function initApp() {
            try {
                await loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
                await loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js');
                
                document.getElementById('loading-screen').style.display = 'none';

                start3DEngine();
            } catch (error) {
                console.error("Error loading scripts:", error);
                document.getElementById('loading-screen').innerHTML = "ເກີດຂໍ້ຜິດພາດໃນການໂຫຼດຂໍ້ມູນ. ກະລຸນາລອງໃໝ່.";
            }
        }

        initApp();

        function start3DEngine() {
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);
            
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-30, 20, -25); 

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.localClippingEnabled = true; // ເປີດໃຊ້ງານລະບົບຕັດ (Clipping) ຂອງ Three.js
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 
            controls.target.set(0, 2, 0);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(-15, 25, 15);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.camera.left = -30;
            dirLight.shadow.camera.right = 30;
            dirLight.shadow.camera.top = 30;
            dirLight.shadow.camera.bottom = -30;
            scene.add(dirLight);

            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x556B2F, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.9 });
            const pillarMaterial = new THREE.MeshStandardMaterial({ color: 0x9e9e9e, roughness: 0.8 });
            const roofMaterial = new THREE.MeshStandardMaterial({ color: 0x37474f, roughness: 0.6 });
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.6 });
            const glassMaterial = new THREE.MeshPhysicalMaterial({ color: 0xaaccff, transmission: 0.9, opacity: 1, transparent: true, metalness: 0.5, roughness: 0.1, ior: 1.5, thickness: 0.05 });
            const frameMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const doorMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const woodWallMaterial = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.8 });
            const gableMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9 }); 
            const gypsumMaterial = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 1.0 }); // ວັດສະດຸແຜ່ນຢິບຊໍ້າສີຂາວນວນ

            const houseGroup = new THREE.Group();
            scene.add(houseGroup);

            const wallHeight = 3.0; 
            const shortWallHeight = 2.4; 
            const wallThickness = 0.2;
            const pillarSize = 0.4;
            const topOfWallHeight = wallHeight; 
            const topOfShortWallHeight = shortWallHeight;

            const baseGeometry = new THREE.BoxGeometry(8 + pillarSize, 0.2, 6 + pillarSize);
            const base = new THREE.Mesh(baseGeometry, floorMaterial);
            base.position.set(0, 0.1, 0); 
            base.receiveShadow = true;
            houseGroup.add(base);

            function createWallWithHole(width, height, thickness, holeX, holeWidth, holeY, holeHeight, material) {
                const group = new THREE.Group();
                if (holeY > 0) {
                    const bottomGeo = new THREE.BoxGeometry(width, holeY, thickness);
                    bottomGeo.translate(0, holeY / 2, 0); 
                    const bottomMesh = new THREE.Mesh(bottomGeo, material);
                    bottomMesh.castShadow = true; bottomMesh.receiveShadow = true;
                    group.add(bottomMesh);
                }
                const topHeight = height - (holeY + holeHeight);
                if (topHeight > 0.001) {
                    const topGeo = new THREE.BoxGeometry(width, topHeight, thickness);
                    topGeo.translate(0, topHeight / 2, 0);
                    const topMesh = new THREE.Mesh(topGeo, material);
                    topMesh.position.y = holeY + holeHeight; 
                    topMesh.castShadow = true; topMesh.receiveShadow = true;
                    group.add(topMesh);
                }
                const leftWidth = (width - holeWidth) / 2 + holeX;
                if (leftWidth > 0.001) {
                    const leftGeo = new THREE.BoxGeometry(leftWidth, holeHeight, thickness);
                    leftGeo.translate(0, holeHeight / 2, 0);
                    const leftMesh = new THREE.Mesh(leftGeo, material);
                    leftMesh.position.set(-width/2 + leftWidth/2, holeY, 0);
                    leftMesh.castShadow = true; leftMesh.receiveShadow = true;
                    group.add(leftMesh);
                }
                const rightWidth = width - leftWidth - holeWidth;
                if (rightWidth > 0.001) {
                    const rightGeo = new THREE.BoxGeometry(rightWidth, holeHeight, thickness);
                    rightGeo.translate(0, holeHeight / 2, 0);
                    const rightMesh = new THREE.Mesh(rightGeo, material);
                    rightMesh.position.set(width/2 - rightWidth/2, holeY, 0);
                    rightMesh.castShadow = true; rightMesh.receiveShadow = true;
                    group.add(rightMesh);
                }
                return group;
            }

            function createSolidWall(width, height, thickness, material) {
                const geometry = new THREE.BoxGeometry(width, height, thickness);
                geometry.translate(0, height / 2, 0); 
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true; mesh.receiveShadow = true;
                return mesh;
            }

            function createSlidingWindow(width, height) {
                const group = new THREE.Group();
                const frameThick = 0.04; 
                const innerFrameThick = 0.03; 
                const depth = wallThickness - 0.05; 
                
                const frameGeoV = new THREE.BoxGeometry(frameThick, height, depth);
                const frameGeoH = new THREE.BoxGeometry(width, frameThick, depth);
                const leftFrame = new THREE.Mesh(frameGeoV, frameMaterial); leftFrame.position.x = -width/2 + frameThick/2; group.add(leftFrame);
                const rightFrame = new THREE.Mesh(frameGeoV, frameMaterial); rightFrame.position.x = width/2 - frameThick/2; group.add(rightFrame);
                const topFrame = new THREE.Mesh(frameGeoH, frameMaterial); topFrame.position.y = height/2 - frameThick/2; group.add(topFrame);
                const bottomFrame = new THREE.Mesh(frameGeoH, frameMaterial); bottomFrame.position.y = -height/2 + frameThick/2; group.add(bottomFrame);

                const overlap = 0.05; 
                const panelWidth = (width - frameThick*2) / 2 + overlap;
                const panelHeight = height - frameThick*2;
                
                function createPanel() {
                    const panelGroup = new THREE.Group();
                    const innerGeoV = new THREE.BoxGeometry(innerFrameThick, panelHeight, innerFrameThick);
                    const innerGeoH = new THREE.BoxGeometry(panelWidth, innerFrameThick, innerFrameThick);
                    const pLeft = new THREE.Mesh(innerGeoV, frameMaterial); pLeft.position.x = -panelWidth/2 + innerFrameThick/2; panelGroup.add(pLeft);
                    const pRight = new THREE.Mesh(innerGeoV, frameMaterial); pRight.position.x = panelWidth/2 - innerFrameThick/2; panelGroup.add(pRight);
                    const pTop = new THREE.Mesh(innerGeoH, frameMaterial); pTop.position.y = panelHeight/2 - innerFrameThick/2; panelGroup.add(pTop);
                    const pBottom = new THREE.Mesh(innerGeoH, frameMaterial); pBottom.position.y = -panelHeight/2 + innerFrameThick/2; panelGroup.add(pBottom);

                    const glassGeo = new THREE.BoxGeometry(panelWidth - innerFrameThick*2, panelHeight - innerFrameThick*2, 0.01);
                    const glass = new THREE.Mesh(glassGeo, glassMaterial);
                    panelGroup.add(glass);
                    return panelGroup;
                }

                const panel1 = createPanel(); panel1.position.set(-width/4 + overlap/2, 0, 0.02); group.add(panel1);
                const panel2 = createPanel(); panel2.position.set(width/4 - overlap/2, 0, -0.02); group.add(panel2);
                return group;
            }

            function createDoor(width, height) {
                const group = new THREE.Group();
                const door = new THREE.Mesh(new THREE.BoxGeometry(width, height, 0.05), doorMaterial);
                door.position.set(width/2, height/2, 0); 
                const pivot = new THREE.Group();
                pivot.add(door); pivot.rotation.y = -Math.PI / 4; pivot.position.set(-width/2, 0, 0);
                group.add(pivot);
                return group;
            }

            // ສ້າງຟັງຊັນໃໝ່ສຳລັບປ່ອງຢ້ຽມ 3 ປ່ອງ
            function createThreePanelWindow(width, height) {
                const group = new THREE.Group();
                const frameThick = 0.04; 
                const innerFrameThick = 0.03; 
                const depth = wallThickness - 0.05; 
                
                // ກອບປ່ອງຢ້ຽມນອກ
                const frameGeoV = new THREE.BoxGeometry(frameThick, height, depth);
                const frameGeoH = new THREE.BoxGeometry(width, frameThick, depth);
                const leftFrame = new THREE.Mesh(frameGeoV, frameMaterial); leftFrame.position.x = -width/2 + frameThick/2; group.add(leftFrame);
                const rightFrame = new THREE.Mesh(frameGeoV, frameMaterial); rightFrame.position.x = width/2 - frameThick/2; group.add(rightFrame);
                const topFrame = new THREE.Mesh(frameGeoH, frameMaterial); topFrame.position.y = height/2 - frameThick/2; group.add(topFrame);
                const bottomFrame = new THREE.Mesh(frameGeoH, frameMaterial); bottomFrame.position.y = -height/2 + frameThick/2; group.add(bottomFrame);

                // ຄຳນວນຂະໜາດບານປ່ອງຢ້ຽມ 3 ບານ (ປະມານ 50 ຊມ ຕໍ່ບານ)
                const panelWidth = (width - frameThick*2) / 3;
                const panelHeight = height - frameThick*2;
                
                function createPanel() {
                    const panelGroup = new THREE.Group();
                    const innerGeoV = new THREE.BoxGeometry(innerFrameThick, panelHeight, innerFrameThick);
                    const innerGeoH = new THREE.BoxGeometry(panelWidth, innerFrameThick, innerFrameThick);
                    const pLeft = new THREE.Mesh(innerGeoV, frameMaterial); pLeft.position.x = -panelWidth/2 + innerFrameThick/2; panelGroup.add(pLeft);
                    const pRight = new THREE.Mesh(innerGeoV, frameMaterial); pRight.position.x = panelWidth/2 - innerFrameThick/2; panelGroup.add(pRight);
                    const pTop = new THREE.Mesh(innerGeoH, frameMaterial); pTop.position.y = panelHeight/2 - innerFrameThick/2; panelGroup.add(pTop);
                    const pBottom = new THREE.Mesh(innerGeoH, frameMaterial); pBottom.position.y = -panelHeight/2 + innerFrameThick/2; panelGroup.add(pBottom);

                    const glassGeo = new THREE.BoxGeometry(panelWidth - innerFrameThick*2, panelHeight - innerFrameThick*2, 0.01);
                    const glass = new THREE.Mesh(glassGeo, glassMaterial);
                    panelGroup.add(glass);
                    return panelGroup;
                }

                const p1 = createPanel(); p1.position.x = -panelWidth; group.add(p1); // ບານຊ້າຍ
                const p2 = createPanel(); p2.position.x = 0; group.add(p2);           // ບານກາງ
                const p3 = createPanel(); p3.position.x = panelWidth; group.add(p3);  // ບານຂວາ
                return group;
            }

            const pillarPositions = [
                [4, 0, 3], [4, 0, 0], [4, 0, -3], 
                [0, 0, 3], [0, 0, 0], [0, 0, -3], 
                [-4, 0, -3], [-4, 0, 0], 
                [-4, 0, 3]  
            ];
            
            pillarPositions.forEach((pos, index) => {
                let pMesh;
                let isShortPillar = (index >= 6); 
                let currentHeight = isShortPillar ? shortWallHeight : wallHeight;

                // ປ່ຽນໃຫ້ທຸກເສົາເປັນຮູບສີ່ລ່ຽມ (BoxGeometry) ແບບດຽວກັນໝົດ
                const pGeoTall = new THREE.BoxGeometry(pillarSize, currentHeight, pillarSize);
                pGeoTall.translate(0, currentHeight/2, 0);
                pMesh = new THREE.Mesh(pGeoTall, pillarMaterial);
                
                pMesh.position.set(pos[0], 0, pos[2]);
                pMesh.castShadow = true; pMesh.receiveShadow = true;
                houseGroup.add(pMesh);
            });

        const winWidth = 1.5, winHeight = 1.2, winY = 0.9;
        const doorWidth = 0.9, doorHeight = 2.1;

        // ປັບຂະໜາດຝາໜ້າຫ້ອງ 1 ກັບຄືນໃຫ້ພໍດີຊ່ອງເສົາ
        const wall1_bottom = createSolidWall(4 - pillarSize, wallHeight, wallThickness, wallMaterial);
        wall1_bottom.position.set(2, 0, 3); houseGroup.add(wall1_bottom);
        
        // --- ຝາຂ້າງຫ້ອງ 1 (ເບື້ອງກຳແພງຮົ້ວ) ---
        const wall1_right_length = 3 - pillarSize;
        
        // ກໍ່ເປັນຝາຕັນຕາມທີ່ໝາຍ X ສີແດງໃຫ້
        const wall1_right = createSolidWall(wall1_right_length, wallHeight, wallThickness, wallMaterial);
        wall1_right.position.set(4, 0, 1.5);
        wall1_right.rotation.y = Math.PI / 2;
        houseGroup.add(wall1_right);
        
        // ກໍ່ຝາແບ່ງຫ້ອງ 1 ແລະ 2 ພ້ອມທັງເຈາະປະຕູຫາກັນ
        const wall1_top = createWallWithHole(4 - pillarSize, wallHeight, wallThickness, -0.85, doorWidth, 0, doorHeight, wallMaterial);
        wall1_top.position.set(2, 0, 0); houseGroup.add(wall1_top);
        
        const doorBetween = createDoor(doorWidth, doorHeight);
        doorBetween.position.set(1.15, 0, 0); // ຕຳແໜ່ງປະຕູ ໃກ້ເສົາກາງ (x=0)
        doorBetween.children[0].rotation.y = -Math.PI / 3; // ໄຂບານປະຕູອອກໄປທາງຫ້ອງເລກ 1 (ທິດ +z)
        houseGroup.add(doorBetween);

        // ປ່ຽນຝາຫ້ອງ 1 ດ້ານຊ້າຍ (ໜ້າລະບຽງ) ຈາກປະຕູເປັນປ່ອງຢ້ຽມ 3 ປ່ອງ
        const wall1_left_length = 3 - pillarSize;
        const threeWinWidth = 1.5; // ກວ້າງລວມ 1.5 ແມັດ (3 ປ່ອງ ປ່ອງລະ ~0.5 ແມັດ)
        const threeWinHeight = 1.2;
        const threeWinY = 0.9;
        
        // ເຈາະຮູຝາສຳລັບປ່ອງຢ້ຽມ 3 ປ່ອງ
        const wall1_left = createWallWithHole(wall1_left_length, wallHeight, wallThickness, 0, threeWinWidth, threeWinY, threeWinHeight, wallMaterial);
        wall1_left.position.set(0, 0, 1.5); 
        wall1_left.rotation.y = Math.PI / 2; 
        houseGroup.add(wall1_left);
        
        // ເອົາປ່ອງຢ້ຽມ 3 ປ່ອງມາໃສ່ແທນປະຕູ
        const window3Panels = createThreePanelWindow(threeWinWidth, threeWinHeight);
        window3Panels.position.set(0, threeWinY + threeWinHeight/2, 1.5); 
        window3Panels.rotation.y = Math.PI / 2;
        houseGroup.add(window3Panels);

        // --- ປ່ຽນປ່ອງຢ້ຽມຫ້ອງເລກ 2 ເປັນແບບ 3 ປ່ອງ ---
        const wall2_top = createWallWithHole(4 - pillarSize, wallHeight, wallThickness, 0, threeWinWidth, threeWinY, threeWinHeight, wallMaterial);
        wall2_top.position.set(2, 0, -3); houseGroup.add(wall2_top);
            const win2 = createThreePanelWindow(threeWinWidth, threeWinHeight);
            win2.position.set(2, threeWinY + threeWinHeight/2, -3); houseGroup.add(win2);
            const wall2_right = createSolidWall(wallThickness, wallHeight, 3 - pillarSize, wallMaterial);
            wall2_right.position.set(4, 0, -1.5); houseGroup.add(wall2_right);

            // ກໍ່ຕັນຝາຫ້ອງເລກ 2 (ດ້ານຊ້າຍ x=0) ແລະ ເຈາະປະຕູຕິດເສົາກາງ
            const wall2_left_length = 3 - pillarSize;
            const wall2_left = createWallWithHole(wall2_left_length, wallHeight, wallThickness, -0.85, doorWidth, 0, doorHeight, wallMaterial);
            wall2_left.position.set(0, 0, -1.5); 
            wall2_left.rotation.y = Math.PI / 2; 
            houseGroup.add(wall2_left);
            
            const door2 = createDoor(doorWidth, doorHeight);
            door2.position.set(0, 0, -1.55); 
            door2.rotation.y = Math.PI / 2;
            door2.children[0].rotation.y = Math.PI / 2; // ເປີດເຂົ້າຫາຫ້ອງ 3 (ທິດທາງອ້າອອກໄປທາງກຳແພງ)
            houseGroup.add(door2);
            
            // ສ້າງຝາຂັ້ນຫ້ອງເລກ 2 (ໂຄງໂລ+ແຜ່ນຢິບຊໍ້າ) ຫ່າງຈາກເສົາກາງ 1 ແມັດ
            const partitionZ = -1.0; 
            const gypsumThickness = 0.08;
            
            // ເຈາະຮູປະຕູໃສ່ຝາຢິບຊໍ້າ ໃຫ້ກົງກັບປະຕູຫ້ອງ 1 (holeX = -0.85)
            const partitionWall = createWallWithHole(4 - pillarSize, wallHeight, gypsumThickness, -0.85, doorWidth, 0, doorHeight, gypsumMaterial);
            partitionWall.position.set(2, 0, partitionZ);
            houseGroup.add(partitionWall);

            // ເພີ່ມປະຕູໃສ່ຊ່ອງທີ່ເຈາະໃໝ່
            const doorPartition = createDoor(doorWidth, doorHeight);
            // ຕັ້ງຕຳແໜ່ງໃຫ້ກົງກັບຊ່ອງທີ່ເຈາະ (x = 1.15 ຄືກັບປະຕູຫ້ອງ 1) 
            // ຍັບແກນ Z ໄປທີ່ partitionZ 
            doorPartition.position.set(1.15, 0, partitionZ);
            // ຕັ້ງຄ່າໃຫ້ເປີດເຂົ້າໄປໃນຫ້ອງເລກ 2 (ທິດ -Z)
            doorPartition.children[0].rotation.y = Math.PI / 2; 
            houseGroup.add(doorPartition);

            // --- ຫ້ອງ 3 ---
            // ປັບຄວາມສູງຂອງຝາຫຼັງຫ້ອງ 3 ໃຫ້ພຽງກັບຫົວເສົາສັ້ນ (shortWallHeight) 2.4 ແມັດ ເພື່ອບໍ່ໃຫ້ຊອດຫຼັງຄາ
            // ຫຍັບປ່ອງຫວ່າງໄປທາງຫ້ອງເລກ 2 ປະມານ 1 ແມັດ (ປ່ຽນຄ່າຈາກ -0.4 ເປັນ 0.6)
            const wall3_back = createWallWithHole(4 - pillarSize, shortWallHeight, wallThickness, 0.6, doorWidth, 0, doorHeight, wallMaterial);

            function createGable(width, heightLeft, heightRight, depth, material) {
                const shape = new THREE.Shape();
                shape.moveTo(-width/2, 0); 
                shape.lineTo(width/2, 0); 
                shape.lineTo(width/2, heightRight); 
                shape.lineTo(-width/2, heightLeft); 
                shape.lineTo(-width/2, 0);
                const extrudeSettings = { depth: depth, bevelEnabled: false, curveSegments: 1 };
                const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                geo.center(); 
                return new THREE.Mesh(geo, material);

            function createRoomLabel(text, x, z) {
                const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;

                ctx.beginPath(); ctx.arc(128, 128, 100, 0, 2 * Math.PI); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 5; ctx.stroke();
                ctx.font = 'bold 120px Arial'; ctx.fillStyle = 'red'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(text, 128, 128);
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
                mesh.rotation.x = -Math.PI / 2; mesh.position.set(x, 0.21, z); return mesh;
            }

            // ອັບເດດຕຳແໜ່ງປ້າຍໝາຍເລກຫ້ອງໃຫ້ຢູ່ເຄິ່ງກາງພໍດີ

            function createDimensionLine(p1, p2, text, textOffsetX, textOffsetZ, rotation) {
                const group = new THREE.Group();
                const mat = new THREE.LineBasicMaterial({ color: 0xff0000 }); 
                const geom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                const line = new THREE.Line(geom, mat);
                group.add(line);

                const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                const perp = new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(0.25);
                
                const t1p1 = p1.clone().add(perp);
                const t1p2 = p1.clone().sub(perp);
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([t1p1, t1p2]), mat));
                
                const t2p1 = p2.clone().add(perp);
                const t2p2 = p2.clone().sub(perp);
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([t2p1, t2p2]), mat));

                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.font = 'bold 28px Arial'; ctx.fillStyle = 'red'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, 64, 32);
                
                const tex = new THREE.CanvasTexture(canvas);
                const planeMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }); 
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.75), planeMat);
                plane.rotation.x = -Math.PI / 2;
                plane.rotation.z = rotation;
                
                const midX = (p1.x + p2.x) / 2 + textOffsetX;
                const midZ = (p1.z + p2.z) / 2 + textOffsetZ;
                plane.position.set(midX, p1.y, midZ);
                group.add(plane);
                
                return group;
            }

            const dimY = 0.22;

                new THREE.Vector3(-19.5, 0, -4.5), // 1: ແຈຫຼັງຊ້າຍ (ປະຕູຮົ້ວຢູ່ດ້ານນີ້)

            tBase.receiveShadow = true;
            toiletGroup.add(tBase);

            // ຝາຊ້າຍ (ເບື້ອງທີ່ຫັນໜ້າໄປຫາປ່ອງຢ້ຽມຫ້ອງ 2) - ເຈາະປະຕູທາງອອກ
            const tLeftWall = createWallWithHole(tD, tH, tThick, 0, tDoorW, 0, 2.0, wallMaterial);
            tLeftWall.position.set(-tW/2 + tThick/2, 0, 0);
            tLeftWall.rotation.y = Math.PI / 2;
            toiletGroup.add(tLeftWall);

            // ຝາຂວາ (ເບື້ອງທີ່ຊື່ກັບແຈເສົາດ້ານນອກ) - ເປັນຝາຕັນ
            const tRightWall = createSolidWall(tThick, tH, tD, wallMaterial);
            tRightWall.position.set(tW/2 - tThick/2, 0, 0);
            toiletGroup.add(tRightWall);

            // ປະຕູຫ້ອງນໍ້າ ໃສ່ຝາຊ້າຍ ໃຫ້ໄຂອອກນອກ
            const tDoor = createDoor(tDoorW, 2.0);
            tDoor.position.set(-tW/2 + tThick/2 + 0.05, 0, 0); 
            tDoor.rotation.y = Math.PI / 2; 
            tDoor.children[0].rotation.y = -Math.PI / 2; 
            toiletGroup.add(tDoor);

            // ຕັ້ງຕຳແໜ່ງຫ້ອງນໍ້າໃໝ່ ໃຫ້ເລີ່ມຈາກແຈເສົາຫ້ອງເລກ 2 (ແຈຂວາ x=4)
            // ຍັບມາທາງຊ້າຍ (ຫາປ່ອງຢ້ຽມຫ້ອງ 2) = 4 - 1.5/2 = 3.25
            // ຝາຫຼັງບ້ານຢູ່ແກນ Z=-3. ຍັບໄປຫາກຳແພງ (2.5/2) = -4.25
            toiletGroup.position.set(3.25, 0, -4.25);
            toiletGroup.rotation.y = 0;

            // --- ເຮືອນຄົວ (Kitchen) ຕໍ່ຈາກຫ້ອງນໍ້າ ---
            const kitchenGroup = new THREE.Group();
            houseGroup.add(kitchenGroup);

            // ຄວາມຍາວເລີ່ມຈາກປະຕູຫ້ອງນໍ້າ (x=2.5) ຫາ ແຈຫ້ອງເລກ 3 (x=-4.0)
            const kW = 6.5; 
            const kD = 2.5; // ຄວາມເລິກຈາກຝາເຮືອນຫາກຳແພງ
            const kH = 2.15; 

            // ພື້ນເຮືອນຄົວ
            const kBase = new THREE.Mesh(new THREE.BoxGeometry(kW, 0.2, kD), floorMaterial);
            kBase.position.set(2.5 - kW/2, 0.1, -3 - kD/2); // ຕັ້ງໃຫ້ຕໍ່ຈາກປະຕູຫ້ອງນໍ້າພໍດີ
            kBase.receiveShadow = true;
            kitchenGroup.add(kBase);

            // ຝາປິດດ້ານຂ້າງເຮືອນຄົວ (ຕິດແຈຫ້ອງ 3)
            const kSideWall = createSolidWall(wallThickness, kH, kD, wallMaterial);
            kSideWall.position.set(-4, 0, -4.25);
            kitchenGroup.add(kSideWall);

            // ເຄົາເຕີຄົວ (Kitchen Counter)
            const counterW = 3.0;
            const counterH = 0.85;
            const counterD = 0.6;
            const counterMat = new THREE.MeshStandardMaterial({ color: 0x607d8b, roughness: 0.4 });
            const counter = new THREE.Mesh(new THREE.BoxGeometry(counterW, counterH, counterD), counterMat);
            counter.position.set(-2.0, counterH/2, -5.2); // ຕັ້ງຕິດກຳແພງຫຼັງບ້ານ
            counter.castShadow = true; counter.receiveShadow = true;
            kitchenGroup.add(counter);

            // ຫຼັງຄາເຊື່ອມຕໍ່ (ປົກຄຸມທັງຫ້ອງນໍ້າ + ເຮືອນຄົວ)
            const backRoofW = 8.8; // ກວມເອົາຄວາມຍາວຫຼັງບ້ານທັງໝົດ 8m + ຍື່ນອອກຂ້າງລະ 0.4m
            const backRoofD = 2.9; // ຍື່ນອອກໜ້າຫຼັງ
            const sharedBackRoof = new THREE.Mesh(new THREE.BoxGeometry(backRoofW, 0.2, backRoofD), roofMaterial);
            // ປັບລະດັບ Y ເປັນ 2.2 ເພື່ອໃຫ້ຂອບຫຼັງຄາເບື້ອງບ້ານ (Z=-3) ສູງ 2.4m ພໍດີກັບຫົວເສົາຫ້ອງ 3
            sharedBackRoof.position.set(0, 2.2, -4.25);
            sharedBackRoof.rotation.x = -0.08; // ລາດອຽງໄປທາງກຳແພງຫຼັງ
            sharedBackRoof.castShadow = true;
            sharedBackRoof.name = "sharedBackRoof";
            houseGroup.add(sharedBackRoof);

            // ໝູນຕົວເຮືອນທັງໝົດ 90 ອົງສາໄປທາງຂວາ (ຕາມເຂັມໂມງ) ເມື່ອທຽບກັບມູມມອງຈາກປະຕູຮົ້ວ
            houseGroup.rotation.y = -Math.PI / 2;
            roofGroup.rotation.y = -Math.PI / 2;
            annotationGroup.rotation.y = -Math.PI / 2;

            // ຫຍັບເຮືອນທັງໝົດຖອຍຫຼັງ (ແກນ +Z) ໄປ 50 ຊມ (0.5 ແມັດ) ໃຫ້ຫ່າງຈາກກຳແພງໜ້າ
            houseGroup.position.z = 0.5;
            roofGroup.position.z = 0.5;
            annotationGroup.position.z = 0.5;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, false);

            function animate() {
                requestAnimationFrame(animate);
                controls.update(); 
                
                const time = Date.now() * 0.001; 

                const angle = controls.getPolarAngle();
                
                roofGroup.visible = (angle >= 0.8);
                
                // ເຊື່ອງ/ສະແດງ ຫຼັງຄາເຮືອນຄົວແລະຫ້ອງນໍ້າ ເວລາເບິ່ງຈາກມຸມສູງ
                const targetBackRoof = scene.getObjectByName("sharedBackRoof");
                if (targetBackRoof) {
                    targetBackRoof.visible = (angle >= 0.8);
                }

                if (typeof annotationGroup !== 'undefined') {
                    annotationGroup.visible = (angle < 0.8);
                }

                if (mainGate) {
                    currentGateSlide += (targetGateSlide - currentGateSlide) * 0.05;
                    mainGate.position.x = gateBaseX + currentGateSlide;
                }

                renderer.render(scene, camera);
            }

            animate();
        }
    </script>
</body>
</html>
