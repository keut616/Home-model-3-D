<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ແບບຈຳລອງ 3 ມິຕິ ເຮືອນໂມເດີນ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Noto Sans Lao', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #87CEEB; display: flex; justify-content: center; align-items: center;
            z-index: 100; color: white; font-size: 24px; font-weight: bold; flex-direction: column;
        }
        .spinner {
            border: 6px solid rgba(255,255,255,0.3); border-top: 6px solid white;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div>ກຳລັງໂຫຼດແບບຈຳລອງ 3 ມິຕິ...</div>
    </div>

    <div id="canvas-container"></div>

    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-10" style="display:none;" id="ui-container">
        <button id="toggleGateBtn" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white text-lg font-bold rounded-full shadow-[0_4px_15px_rgba(0,0,0,0.3)] border-2 border-white/50 transition-all duration-300">
            ເປີດປະຕູຮົ້ວ
        </button>
    </div>

    <script>
        /* STREAMING_CHUNK:Loading External Scripts Dynamically... */
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function initApp() {
            try {
                await loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
                await loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js');
                
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('ui-container').style.display = 'block';

                start3DEngine();
            } catch (error) {
                console.error("Error loading scripts:", error);
                document.getElementById('loading-screen').innerHTML = "ເກີດຂໍ້ຜິດພາດໃນການໂຫຼດຂໍ້ມູນ. ກະລຸນາລອງໃໝ່.";
            }
        }

        initApp();

        function start3DEngine() {
            /* STREAMING_CHUNK:Setting up Scene, Camera, and Lights... */
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);
            
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-30, 20, -25); 

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 
            controls.target.set(0, 2, 0);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(-15, 25, 15);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.camera.left = -30;
            dirLight.shadow.camera.right = 30;
            dirLight.shadow.camera.top = 30;
            dirLight.shadow.camera.bottom = -30;
            scene.add(dirLight);

            /* STREAMING_CHUNK:Creating ground and materials... */
            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x556B2F, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.9 });
            const pillarMaterial = new THREE.MeshStandardMaterial({ color: 0x9e9e9e, roughness: 0.8 });
            const roofMaterial = new THREE.MeshStandardMaterial({ color: 0x37474f, roughness: 0.6 });
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.6 });
            const glassMaterial = new THREE.MeshPhysicalMaterial({ color: 0xaaccff, transmission: 0.9, opacity: 1, transparent: true, metalness: 0.5, roughness: 0.1, ior: 1.5, thickness: 0.05 });
            const frameMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const doorMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const woodWallMaterial = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.8 });
            const gableMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9 }); 

            /* STREAMING_CHUNK:Defining helper functions for house building... */
            const houseGroup = new THREE.Group();
            scene.add(houseGroup);

            const wallHeight = 3.0; 
            const shortWallHeight = 2.4; 
            const wallThickness = 0.2;
            const pillarSize = 0.4;
            const topOfWallHeight = wallHeight; 
            const topOfShortWallHeight = shortWallHeight;

            const baseGeometry = new THREE.BoxGeometry(8 + pillarSize, 0.2, 6 + pillarSize);
            const base = new THREE.Mesh(baseGeometry, floorMaterial);
            base.position.set(0, 0.1, 0); 
            base.receiveShadow = true;
            houseGroup.add(base);

            function createWallWithHole(width, height, thickness, holeX, holeWidth, holeY, holeHeight, material) {
                const group = new THREE.Group();
                if (holeY > 0) {
                    const bottomGeo = new THREE.BoxGeometry(width, holeY, thickness);
                    bottomGeo.translate(0, holeY / 2, 0); 
                    const bottomMesh = new THREE.Mesh(bottomGeo, material);
                    bottomMesh.castShadow = true; bottomMesh.receiveShadow = true;
                    group.add(bottomMesh);
                }
                const topHeight = height - (holeY + holeHeight);
                if (topHeight > 0.001) {
                    const topGeo = new THREE.BoxGeometry(width, topHeight, thickness);
                    topGeo.translate(0, topHeight / 2, 0);
                    const topMesh = new THREE.Mesh(topGeo, material);
                    topMesh.position.y = holeY + holeHeight; 
                    topMesh.castShadow = true; topMesh.receiveShadow = true;
                    group.add(topMesh);
                }
                const leftWidth = (width - holeWidth) / 2 + holeX;
                if (leftWidth > 0.001) {
                    const leftGeo = new THREE.BoxGeometry(leftWidth, holeHeight, thickness);
                    leftGeo.translate(0, holeHeight / 2, 0);
                    const leftMesh = new THREE.Mesh(leftGeo, material);
                    leftMesh.position.set(-width/2 + leftWidth/2, holeY, 0);
                    leftMesh.castShadow = true; leftMesh.receiveShadow = true;
                    group.add(leftMesh);
                }
                const rightWidth = width - leftWidth - holeWidth;
                if (rightWidth > 0.001) {
                    const rightGeo = new THREE.BoxGeometry(rightWidth, holeHeight, thickness);
                    rightGeo.translate(0, holeHeight / 2, 0);
                    const rightMesh = new THREE.Mesh(rightGeo, material);
                    rightMesh.position.set(width/2 - rightWidth/2, holeY, 0);
                    rightMesh.castShadow = true; rightMesh.receiveShadow = true;
                    group.add(rightMesh);
                }
                return group;
            }

            function createSolidWall(width, height, thickness, material) {
                const geometry = new THREE.BoxGeometry(width, height, thickness);
                geometry.translate(0, height / 2, 0); 
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true; mesh.receiveShadow = true;
                return mesh;
            }

            function createSlidingWindow(width, height) {
                const group = new THREE.Group();
                const frameThick = 0.04; 
                const innerFrameThick = 0.03; 
                const depth = wallThickness - 0.05; 
                
                const frameGeoV = new THREE.BoxGeometry(frameThick, height, depth);
                const frameGeoH = new THREE.BoxGeometry(width, frameThick, depth);
                const leftFrame = new THREE.Mesh(frameGeoV, frameMaterial); leftFrame.position.x = -width/2 + frameThick/2; group.add(leftFrame);
                const rightFrame = new THREE.Mesh(frameGeoV, frameMaterial); rightFrame.position.x = width/2 - frameThick/2; group.add(rightFrame);
                const topFrame = new THREE.Mesh(frameGeoH, frameMaterial); topFrame.position.y = height/2 - frameThick/2; group.add(topFrame);
                const bottomFrame = new THREE.Mesh(frameGeoH, frameMaterial); bottomFrame.position.y = -height/2 + frameThick/2; group.add(bottomFrame);

                const overlap = 0.05; 
                const panelWidth = (width - frameThick*2) / 2 + overlap;
                const panelHeight = height - frameThick*2;
                
                function createPanel() {
                    const panelGroup = new THREE.Group();
                    const innerGeoV = new THREE.BoxGeometry(innerFrameThick, panelHeight, innerFrameThick);
                    const innerGeoH = new THREE.BoxGeometry(panelWidth, innerFrameThick, innerFrameThick);
                    const pLeft = new THREE.Mesh(innerGeoV, frameMaterial); pLeft.position.x = -panelWidth/2 + innerFrameThick/2; panelGroup.add(pLeft);
                    const pRight = new THREE.Mesh(innerGeoV, frameMaterial); pRight.position.x = panelWidth/2 - innerFrameThick/2; panelGroup.add(pRight);
                    const pTop = new THREE.Mesh(innerGeoH, frameMaterial); pTop.position.y = panelHeight/2 - innerFrameThick/2; panelGroup.add(pTop);
                    const pBottom = new THREE.Mesh(innerGeoH, frameMaterial); pBottom.position.y = -panelHeight/2 + innerFrameThick/2; panelGroup.add(pBottom);

                    const glassGeo = new THREE.BoxGeometry(panelWidth - innerFrameThick*2, panelHeight - innerFrameThick*2, 0.01);
                    const glass = new THREE.Mesh(glassGeo, glassMaterial);
                    panelGroup.add(glass);
                    return panelGroup;
                }

                const panel1 = createPanel(); panel1.position.set(-width/4 + overlap/2, 0, 0.02); group.add(panel1);
                const panel2 = createPanel(); panel2.position.set(width/4 - overlap/2, 0, -0.02); group.add(panel2);
                return group;
            }

            function createDoor(width, height) {
                const group = new THREE.Group();
                const door = new THREE.Mesh(new THREE.BoxGeometry(width, height, 0.05), doorMaterial);
                door.position.set(width/2, height/2, 0); 
                const pivot = new THREE.Group();
                pivot.add(door); pivot.rotation.y = -Math.PI / 4; pivot.position.set(-width/2, 0, 0);
                group.add(pivot);
                return group;
            }

            /* STREAMING_CHUNK:Constructing house walls and pillars... */
            const pillarPositions = [
                [4, 0, 3], [4, 0, 0], [4, 0, -3], 
                [0, 0, 3], [0, 0, 0], [0, 0, -3], 
                [-4, 0, -3], [-4, 0, 0], 
                [-4, 0, 3]  
            ];
            
            pillarPositions.forEach((pos, index) => {
                let pMesh;
                let isShortPillar = (index >= 6); 
                let currentHeight = isShortPillar ? shortWallHeight : wallHeight;

                if (isShortPillar) {
                    const pRoundGeoShort = new THREE.CylinderGeometry(pillarSize/1.5, pillarSize/1.5, currentHeight, 16);
                    pRoundGeoShort.translate(0, currentHeight/2, 0); 
                    pMesh = new THREE.Mesh(pRoundGeoShort, pillarMaterial);
                } else {
                    const pGeoTall = new THREE.BoxGeometry(pillarSize, currentHeight, pillarSize);
                    pGeoTall.translate(0, currentHeight/2, 0);
                    pMesh = new THREE.Mesh(pGeoTall, pillarMaterial);
                }
                pMesh.position.set(pos[0], 0, pos[2]);
                pMesh.castShadow = true; pMesh.receiveShadow = true;
                houseGroup.add(pMesh);
            });

            const winWidth = 1.5, winHeight = 1.2, winY = 0.9;
            const doorWidth = 0.9, doorHeight = 2.1;

            const wall1_bottom = createSolidWall(4 - pillarSize, wallHeight, wallThickness, wallMaterial);
            wall1_bottom.position.set(2, 0, 3); houseGroup.add(wall1_bottom);
            const wall1_right = createSolidWall(wallThickness, wallHeight, 3 - pillarSize, wallMaterial);
            wall1_right.position.set(4, 0, 1.5); houseGroup.add(wall1_right);
            const wall1_top = createWallWithHole(4 - pillarSize, wallHeight, wallThickness, -1, doorWidth, 0, doorHeight, wallMaterial);
            wall1_top.position.set(2, 0, 0); houseGroup.add(wall1_top);
            
            const door1 = createDoor(doorWidth, doorHeight);
            door1.position.set(2 - 1, 0, 0); door1.rotation.y = Math.PI; 
            houseGroup.add(door1);

            const wall1_left_length = 3 - pillarSize;
            const wall1_left = createWallWithHole(wall1_left_length, wallHeight, wallThickness, 0, winWidth, winY, winHeight, wallMaterial);
            wall1_left.position.set(0, 0, 1.5); wall1_left.rotation.y = Math.PI / 2; houseGroup.add(wall1_left);
            const win1 = createSlidingWindow(winWidth, winHeight);
            win1.position.set(0, winY + winHeight/2, 1.5); win1.rotation.y = Math.PI / 2; houseGroup.add(win1);

            const wall2_top = createWallWithHole(4 - pillarSize, wallHeight, wallThickness, 0, winWidth, winY, winHeight, wallMaterial);
            wall2_top.position.set(2, 0, -3); houseGroup.add(wall2_top);
            const win2 = createSlidingWindow(winWidth, winHeight);
            win2.position.set(2, winY + winHeight/2, -3); houseGroup.add(win2);
            const wall2_right = createSolidWall(wallThickness, wallHeight, 3 - pillarSize, wallMaterial);
            wall2_right.position.set(4, 0, -1.5); houseGroup.add(wall2_right);

            const wall3_top = createWallWithHole(4 - pillarSize, shortWallHeight, wallThickness, -0.5, winWidth, winY, winHeight, wallMaterial);
            wall3_top.position.set(-2, 0, -3); houseGroup.add(wall3_top);
            const win3_top = createSlidingWindow(winWidth, winHeight);
            win3_top.position.set(-2 - 0.5, winY + winHeight/2, -3); houseGroup.add(win3_top);

            const wall3_left_full_length = 3 - pillarSize; 
            const sideSlideDoorWidth = 1.8; 
            const wall3_left_mod = createWallWithHole(wall3_left_full_length, shortWallHeight, wallThickness, 0, sideSlideDoorWidth, 0, doorHeight, wallMaterial);
            wall3_left_mod.position.set(-4, 0, -1.5); 
            wall3_left_mod.rotation.y = Math.PI / 2; houseGroup.add(wall3_left_mod);

            const sideSlideGlassDoor = createSlidingWindow(sideSlideDoorWidth, doorHeight);
            sideSlideGlassDoor.position.set(-4, doorHeight/2, -1.5); 
            sideSlideGlassDoor.rotation.y = Math.PI / 2; houseGroup.add(sideSlideGlassDoor);

            const wall3_bottom = createSolidWall(4 - pillarSize, shortWallHeight, wallThickness, wallMaterial);
            wall3_bottom.position.set(-2, 0, 0); houseGroup.add(wall3_bottom);

            /* STREAMING_CHUNK:Building the house roof... */
            const roofGroup = new THREE.Group();
            scene.add(roofGroup);
            
            const roofThickness = 0.2;
            const roofOverhang = 0.8;
            const roofTilt = 0.15;
            const upperRoofHeightOffset = 0.5;

            function createGable(width, heightLeft, heightRight, depth, material) {
                const shape = new THREE.Shape();
                shape.moveTo(-width/2, 0); 
                shape.lineTo(width/2, 0); 
                shape.lineTo(width/2, heightRight); 
                shape.lineTo(-width/2, heightLeft); 
                shape.lineTo(-width/2, 0);
                const extrudeSettings = { depth: depth, bevelEnabled: false, curveSegments: 1 };
                const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                geo.center(); 
                return new THREE.Mesh(geo, material);
            }

            const upperRoofWidth = 4 + pillarSize + roofOverhang*2;
            const upperRoofGeo = new THREE.BoxGeometry(upperRoofWidth, roofThickness, 6 + pillarSize + roofOverhang*2);
            const upperRoof = new THREE.Mesh(upperRoofGeo, roofMaterial);
            const upperRoofCenterY = topOfWallHeight + upperRoofHeightOffset; 
            upperRoof.position.set(2, upperRoofCenterY, 0);
            upperRoof.rotation.z = -roofTilt; upperRoof.castShadow = true; roofGroup.add(upperRoof);

            const lowerRoofWidth = 4 + pillarSize + roofOverhang; 
            const lowerRoofGeo = new THREE.BoxGeometry(lowerRoofWidth, roofThickness, 6 + pillarSize + roofOverhang*2 + 0.5);
            const lowerRoof = new THREE.Mesh(lowerRoofGeo, roofMaterial);
            const lowerRoofCenterX = -2.4; 
            
            const distFromCenterToPillar = -4.0 - lowerRoofCenterX; 
            const lowerY_at_center = topOfShortWallHeight - (distFromCenterToPillar * Math.sin(roofTilt));
            
            lowerRoof.position.set(lowerRoofCenterX, lowerY_at_center, 0); 
            lowerRoof.rotation.z = roofTilt; lowerRoof.castShadow = true; roofGroup.add(lowerRoof);

            const upperRoofLeftY = upperRoofCenterY + (2 * Math.sin(roofTilt)); 
            const lowerRoofRightY = lowerY_at_center + ((0 - lowerRoofCenterX) * Math.sin(roofTilt)); 
            const betweenWallHeight = upperRoofLeftY - lowerRoofRightY + 0.2; 
            
            const betweenWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, betweenWallHeight, 6 + pillarSize + roofOverhang), woodWallMaterial);
            betweenWall.position.set(0, lowerRoofRightY + betweenWallHeight/2 - 0.1, -0.2); 
            betweenWall.castShadow = true; roofGroup.add(betweenWall);

            const hL_upper = upperRoofLeftY - topOfWallHeight;
            const hR_upper = (upperRoofCenterY - (2 * Math.sin(roofTilt))) - topOfWallHeight;
            
            const gable1 = createGable(4, hL_upper, hR_upper, wallThickness, gableMaterial);
            gable1.position.set(2, topOfWallHeight + Math.max(hL_upper, hR_upper)/2, 3); roofGroup.add(gable1);
            const gable2 = createGable(4, hL_upper, hR_upper, wallThickness, gableMaterial);
            gable2.position.set(2, topOfWallHeight + Math.max(hL_upper, hR_upper)/2, -3); roofGroup.add(gable2);
            const rightFiller = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, hR_upper, 6 + pillarSize), gableMaterial);
            rightFiller.position.set(4, topOfWallHeight + hR_upper/2, 0); roofGroup.add(rightFiller);
            const gable3HeightR = lowerRoofRightY - topOfShortWallHeight;
            const gable3 = createGable(4, 0, gable3HeightR, wallThickness, gableMaterial);
            gable3.position.set(-2, topOfShortWallHeight + gable3HeightR/2, -3); roofGroup.add(gable3);
            const gable4 = createGable(4, 0, gable3HeightR, wallThickness, wallMaterial); 
            gable4.position.set(-2, topOfShortWallHeight + gable3HeightR/2, 3); roofGroup.add(gable4);

            /* STREAMING_CHUNK:Adding room labels and dimensions... */
            const annotationGroup = new THREE.Group();
            scene.add(annotationGroup);

            function createRoomLabel(text, x, z) {
                const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.arc(128, 128, 100, 0, 2 * Math.PI); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 5; ctx.stroke();
                ctx.font = 'bold 120px Arial'; ctx.fillStyle = 'red'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(text, 128, 128);
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
                mesh.rotation.x = -Math.PI / 2; mesh.position.set(x, 0.21, z); return mesh;
            }

            annotationGroup.add(createRoomLabel('1', 2, 1.5));
            annotationGroup.add(createRoomLabel('2', 2, -1.5));
            annotationGroup.add(createRoomLabel('3', -2, -1.5));

            function createDimensionLine(p1, p2, text, textOffsetX, textOffsetZ, rotation) {
                const group = new THREE.Group();
                const mat = new THREE.LineBasicMaterial({ color: 0xff0000 }); 
                const geom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                const line = new THREE.Line(geom, mat);
                group.add(line);

                const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                const perp = new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(0.25);
                
                const t1p1 = p1.clone().add(perp);
                const t1p2 = p1.clone().sub(perp);
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([t1p1, t1p2]), mat));
                
                const t2p1 = p2.clone().add(perp);
                const t2p2 = p2.clone().sub(perp);
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([t2p1, t2p2]), mat));

                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.font = 'bold 28px Arial'; ctx.fillStyle = 'red'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, 64, 32);
                
                const tex = new THREE.CanvasTexture(canvas);
                const planeMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }); 
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.75), planeMat);
                plane.rotation.x = -Math.PI / 2;
                plane.rotation.z = rotation;
                
                const midX = (p1.x + p2.x) / 2 + textOffsetX;
                const midZ = (p1.z + p2.z) / 2 + textOffsetZ;
                plane.position.set(midX, p1.y, midZ);
                group.add(plane);
                
                return group;
            }

            const dimY = 0.22; 
            function addDim(x1, z1, x2, z2, text, ox, oz, rot) {
                annotationGroup.add(createDimensionLine(new THREE.Vector3(x1, dimY, z1), new THREE.Vector3(x2, dimY, z2), text, ox, oz, rot));
            }

            addDim(-4, -4.0, 0, -4.0, "4 m", 0, -0.4, 0); 
            addDim(0, -4.0, 4, -4.0, "4 m", 0, -0.4, 0); 
            addDim(4.8, 0, 4.8, 3, "3 m", 0.4, 0, -Math.PI / 2); 
            addDim(4.8, -3, 4.8, 0, "3 m", 0.4, 0, -Math.PI / 2); 
            addDim(4.8, -3, 4.8, -4.5, "1.5 m", 0.4, 0, -Math.PI / 2); 
            addDim(4, -1.5, 5.5, -1.5, "1.5 m", 0, -0.4, 0); 

            /* STREAMING_CHUNK:Constructing boundary walls and the main sliding gate... */
            const fenceGroup = new THREE.Group();
            scene.add(fenceGroup);

            let mainGate;
            let gateBaseX = 0;
            let isGateOpen = false;
            let targetGateSlide = 0;
            let currentGateSlide = 0;
            
            window.setGateState = function(open) {
                if (isGateOpen !== open) {
                    isGateOpen = open;
                    // ປ່ຽນຄ່າຈາກ 4.8 ເປັນ -4.8 ເພື່ອໃຫ້ປະຕູເລື່ອນໄປທາງກົງກັນຂ້າມ
                    targetGateSlide = open ? -4.8 : 0.0;
                    
                    const toggleBtn = document.getElementById('toggleGateBtn');
                    if (toggleBtn) {
                        if (open) {
                            toggleBtn.innerText = 'ປິດປະຕູຮົ້ວ';
                            toggleBtn.classList.replace('bg-blue-600', 'bg-red-600');

            const fenceMat = new THREE.MeshStandardMaterial({ color: 0xd6d6d6, roughness: 0.9 });

            const fPoints = [

                    const w2 = new THREE.Mesh(w2Geo, fenceMat);
                    w2.position.copy(gatePos2).lerp(p2, 0.5);

                    w2.castShadow = true; w2.receiveShadow = true;

                    const pillarG1 = new THREE.Mesh(pGeo, fencePillarMat);
                    pillarG1.position.copy(gatePos1); pillarG1.castShadow = true; fenceGroup.add(pillarG1);

                    const pillarG2 = new THREE.Mesh(pGeo, fencePillarMat);
                    pillarG2.position.copy(gatePos2); pillarG2.castShadow = true; fenceGroup.add(pillarG2);

                    const gateGroup = new THREE.Group();
                    const ironMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.9 });
                    const frameThick = 0.06;

                    const fTop = new THREE.Mesh(new THREE.BoxGeometry(gateW, frameThick, frameThick), ironMat);
                    fTop.position.set(0, fH - frameThick/2, 0); fTop.castShadow = true; gateGroup.add(fTop);

                    const fBot = new THREE.Mesh(new THREE.BoxGeometry(gateW, frameThick, frameThick), ironMat);
                    fBot.position.set(0, frameThick/2 + 0.05, 0); fBot.castShadow = true; gateGroup.add(fBot);

                    const fL = new THREE.Mesh(new THREE.BoxGeometry(frameThick, fH, frameThick), ironMat);
                    fL.position.set(-gateW/2 + frameThick/2, fH/2, 0); fL.castShadow = true; gateGroup.add(fL);

                    const fR = new THREE.Mesh(new THREE.BoxGeometry(frameThick, fH, frameThick), ironMat);
                    fR.position.set(gateW/2 - frameThick/2, fH/2, 0); fR.castShadow = true; gateGroup.add(fR);

                    const numBars = 40;

                    for(let b=1; b<numBars; b++) {

                        bar.position.set(-gateW/2 + b*(gateW/numBars), fH/2, 0);
                        bar.castShadow = true; gateGroup.add(bar);
                    }

                    const gatePivot = new THREE.Group();
                    const angle = -Math.atan2(p2.z - p1.z, p2.x - p1.x);
                    gatePivot.position.copy(gatePos1).lerp(gatePos2, 0.5);
                    gatePivot.rotation.y = angle;
                    gateGroup.position.z = -0.22; 
                    
                    gatePivot.add(gateGroup);
                    fenceGroup.add(gatePivot);

                    mainGate = gateGroup;
                    gateBaseX = 0; 
                } else {
                    const wGeo = new THREE.BoxGeometry(dist, fH, fT);
                    wGeo.translate(0, fH/2, 0);
                    const wall = new THREE.Mesh(wGeo, fenceMat);
                    wall.position.copy(p1).lerp(p2, 0.5); 
                    wall.rotation.y = -Math.atan2(p2.z - p1.z, p2.x - p1.x); 
                    wall.castShadow = true; wall.receiveShadow = true;
                    fenceGroup.add(wall);

                    const pillar = new THREE.Mesh(pGeo, fencePillarMat);

                    pillar.castShadow = true; pillar.receiveShadow = true;

            const tBase = new THREE.Mesh(new THREE.BoxGeometry(tW + 0.2, 0.2, tD + 0.2), floorMaterial);

            tFrontWall.position.set(0, 0, tD/2 - tThick/2);

            toiletGroup.position.set(3.5, 0, 18.5);

            /* STREAMING_CHUNK:Building Cars & Animated Characters... */
            const characters = []; 
            const textureLoader = new THREE.TextureLoader();
            textureLoader.crossOrigin = "Anonymous"; 
            
            function createNameTag(name) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.font = 'bold 36px "Noto Sans Lao", Arial';
                ctx.textAlign = 'center';
                ctx.fillStyle = 'white';
                ctx.fillText(name, 128, 45);
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 3;
                ctx.strokeText(name, 128, 45);
                ctx.fillText(name, 128, 45); 

                const tex = new THREE.CanvasTexture(canvas);
                const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
                const sprite = new THREE.Sprite(mat);
                sprite.scale.set(1.5, 0.375, 1);
                return sprite;
            }

            function createPerson(name, shirtColor, pantsColor, scale, hasLongHair = false, imgName = "") {
                const group = new THREE.Group();
                group.scale.set(scale, scale, scale);
                
                const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdcb3, roughness: 0.6 });
                const shirtMat = new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.8 });
                const pantsMat = new THREE.MeshStandardMaterial({ color: pantsColor, roughness: 0.8 });
                
                const headGroup = new THREE.Group();

                head.castShadow = true; 
                headGroup.add(head);

                if (imgName) {
                    const imgUrl = "https://keut616.github.io/FAMILY/" + imgName;
                    const faceTex = textureLoader.load(imgUrl);
                    const faceMat = new THREE.MeshBasicMaterial({ map: faceTex, transparent: true });
                    const facePlane = new THREE.Mesh(new THREE.PlaneGeometry(0.35, 0.35), faceMat);
                    facePlane.position.set(0, 0, 0.24); 
                    headGroup.add(facePlane);
                }
                group.add(headGroup);
                
                if(hasLongHair) {
                    const hair = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.6, 0.5), new THREE.MeshStandardMaterial({color: 0x111111}));
                    hair.position.set(0, 1.5, -0.1); hair.castShadow = true; group.add(hair);
                }

                const nameTag = createNameTag(name);
                nameTag.position.y = 2.1; group.add(nameTag);

                const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.3), shirtMat);
                body.position.y = 1.15; body.castShadow = true; group.add(body);
                
                const createArm = (isLeft) => {
                    const armPivot = new THREE.Group();
                    armPivot.position.set(isLeft ? -0.4 : 0.4, 1.4, 0);
                    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6), skinMat);
                    arm.position.y = -0.25; arm.castShadow = true;
                    armPivot.add(arm);
                    group.add(armPivot);
                    return armPivot;
                };
                const leftArm = createArm(true);
                const rightArm = createArm(false);

                const createLeg = (isLeft) => {
                    const legPivot = new THREE.Group();
                    legPivot.position.set(isLeft ? -0.15 : 0.15, 0.8, 0);
                    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.7), pantsMat);
                    leg.position.y = -0.35; leg.castShadow = true;
                    legPivot.add(leg);
                    group.add(legPivot);
                    return legPivot;
                };
                const leftLeg = createLeg(true);
                const rightLeg = createLeg(false);

                return { group, leftArm, rightArm, leftLeg, rightLeg, body };
            }

            // 0. ສ້າງລົດເກັງສີຂາວ (ສຳລັບປ້າວັນຂັບ)
            const carGroup = new THREE.Group();
            const carBodyMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.2, metalness: 0.5}); // ລົດສີຂາວ
            const carBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.7, 5), carBodyMat);
            carBody.position.y = 0.6; carBody.castShadow = true; carGroup.add(carBody);

            const cabinMat = new THREE.MeshStandardMaterial({color: 0x222222}); // ກະຈົກລົດສີດຳ
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 2.5), cabinMat);
            cabin.position.set(0, 1.25, -0.5); cabin.castShadow = true; carGroup.add(cabin);

            const wheelMat = new THREE.MeshStandardMaterial({color: 0x111111});
            const wGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16); wGeo.rotateZ(Math.PI / 2);
            const w1 = new THREE.Mesh(wGeo, wheelMat); w1.position.set(1.3, 0.4, 1.5); carGroup.add(w1);
            const w2 = new THREE.Mesh(wGeo, wheelMat); w2.position.set(-1.3, 0.4, 1.5); carGroup.add(w2);
            const w3 = new THREE.Mesh(wGeo, wheelMat); w3.position.set(1.3, 0.4, -1.5); carGroup.add(w3);
            const w4 = new THREE.Mesh(wGeo, wheelMat); w4.position.set(-1.3, 0.4, -1.5); carGroup.add(w4);
            
            // ຕົວລະຄອນໃໝ່ ປ້າວັນ (ນັ່ງໃນລົດ)
            const van = createPerson("ປ້າວັນ", 0xff69b4, 0x111111, 0.85, true, "van.jpg");
            van.group.position.set(0, 0.7, -0.3); // ນັ່ງໃນຫ້ອງໂດຍສານລົດ
            van.leftLeg.visible = false; // ເຊື່ອງຂາເພາະນັ່ງໃນລົດ
            van.rightLeg.visible = false;
            carGroup.add(van.group);
            characters.push(van);

            // ເພີ່ມຕົວລະຄອນໃໝ່ ອາຕີ (ນັ່ງໃນລົດມານຳປ້າວັນ)
            const ati = createPerson("ອາຕີ", 0xffff00, 0x3333ff, 0.6, false, "ati.jpg");
            ati.group.position.set(0.6, 0.7, 0.5); // ນັ່ງຂ້າງປ້າວັນ
            ati.leftLeg.visible = false;
            ati.rightLeg.visible = false;
            carGroup.add(ati.group);
            characters.push(ati);

            // ອັບເດດອະນິເມຊັນປ້າວັນ (ລົງລົດແລ້ວຍ່າງໄປຫາຕູ້ເປ້)
            van.update = (time) => {
                const cycle = 20;
                const t = time % cycle;
                if (t < 16) {
                    van.group.position.set(0, 0.7, -0.3);
                    van.group.rotation.y = 0;
                    van.leftLeg.visible = false;
                    van.rightLeg.visible = false;
                    van.leftArm.rotation.x = 0;
                    van.rightArm.rotation.x = 0;
                    van.leftLeg.rotation.x = 0;
                    van.rightLeg.rotation.x = 0;
                } else {
                    let p = (t - 16) / 4;
                    van.leftLeg.visible = true;
                    van.rightLeg.visible = true;
                    // ຍ່າງໄປຫາຕູ້ເປ້ (ທຽບກັບຕຳແໜ່ງລົດ)
                    van.group.position.x = 0 + p * -3.5;
                    van.group.position.y = 0.7 * (1 - p);
                    van.group.position.z = -0.3 + p * -1.0;
                    van.group.rotation.y = -Math.PI / 2; // ຫັນໜ້າໄປທາງຕູ້ເປ້
                    
                    van.leftLeg.rotation.x = Math.sin(time * 15) * 0.5;
                    van.rightLeg.rotation.x = -Math.sin(time * 15) * 0.5;
                    van.leftArm.rotation.x = Math.sin(time * 15) * 0.5;
                    van.rightArm.rotation.x = -Math.sin(time * 15) * 0.5;
                }
            };

            // ອັບເດດອະນິເມຊັນອາຕີ (ລົງລົດແລ້ວຍ່າງໄປຫາອາເຕ້)
            ati.update = (time) => {
                const cycle = 20;
                const t = time % cycle;
                if (t < 16) {
                    ati.group.position.set(0.6, 0.7, 0.5);
                    ati.group.rotation.y = 0;
                    ati.leftLeg.visible = false;
                    ati.rightLeg.visible = false;
                    ati.leftArm.rotation.x = 0;
                    ati.rightArm.rotation.x = 0;
                    ati.leftLeg.rotation.x = 0;
                    ati.rightLeg.rotation.x = 0;
                } else {
                    let p = (t - 16) / 4;
                    ati.leftLeg.visible = true;
                    ati.rightLeg.visible = true;
                    // ຍ່າງໄປຫາອາເຕ້ (ທຽບກັບຕຳແໜ່ງລົດ)
                    ati.group.position.x = 0.6 + p * 1.0;
                    ati.group.position.y = 0.7 * (1 - p);
                    ati.group.position.z = 0.5 + p * -9.5;
                    ati.group.rotation.y = Math.PI; // ຫັນໜ້າໄປທາງອາເຕ້ (ດ້ານຫຼັງລົດ)
                    
                    ati.leftLeg.rotation.x = Math.sin(time * 15) * 0.5;
                    ati.rightLeg.rotation.x = -Math.sin(time * 15) * 0.5;
                    ati.leftArm.rotation.x = Math.sin(time * 15) * 0.5;
                    ati.rightArm.rotation.x = -Math.sin(time * 15) * 0.5;
                }
            };

            scene.add(carGroup);

            // 1. ແບ້ງ (ຊຸດກິລາສີແດງ, ຍົກດຳເບວ)

            bank.group.position.set(-8, 0, -2);

                const d = new THREE.Group();
                const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.4), new THREE.MeshStandardMaterial({color: 0x888888}));
                bar.rotation.x = Math.PI/2; d.add(bar);
                const wMat = new THREE.MeshStandardMaterial({color: 0x333333});
                const w1 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.1), wMat); w1.rotation.x = Math.PI/2; w1.position.z = 0.15; d.add(w1);
                const w2 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.1), wMat); w2.rotation.x = Math.PI/2; w2.position.z = -0.15; d.add(w2);
                return d;
            };
            const dbLeft = createDumbbell(); dbLeft.position.set(0, -0.6, 0); bank.leftArm.add(dbLeft);
            const dbRight = createDumbbell(); dbRight.position.set(0, -0.6, 0); bank.rightArm.add(dbRight);
            bank.update = (time) => {

            scene.add(sert.group); characters.push(sert);

            // 3. ອາເຕ້ (ພະເອກແລ່ນໄປໄຂປະຕູໃຫ້ປ້າວັນ)
            const arte = createPerson("ອາເຕ້", 0x1e90ff, 0x111111, 0.6, false, "arte.jpg");
            const toyGroup = new THREE.Group();
            const tBody = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            tBody.position.y = 0.2; toyGroup.add(tBody);
            const tArm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            tArm.position.set(0.2, 0.3, 0); tArm.rotation.z = -Math.PI/4; toyGroup.add(tArm);
            toyGroup.position.set(-9.5, 0, 10); scene.add(toyGroup);
            
            // ອະນິເມຊັນຫຼັກ (ເລື່ອງລາວຂອງອາເຕ້ ແລະ ປ້າວັນ ໃນລູບ 20 ວິນາທີ)
            arte.update = (time) => {
                const cycle = 20;
                const t = time % cycle;

                if (t < 5) {
                    // 1. ປ້າວັນຂັບລົດມາຈອດໜ້າປະຕູຮົ້ວດ້ານຫຼັງ (-12.5 ແກນ X)
                    carGroup.position.z = -35 + (t / 5) * 27.5; // ແລ່ນຈາກ -35 ມາຈອດທີ່ -7.5 (ໜ້າປະຕູ)
                    carGroup.position.x = -12.5;
                    window.setGateState(false); // ປະຕູປິດ
                    
                    // ອາເຕ້ນັ່ງຫຼິ້ນລົດຈົກຢູ່ເດີ່ນ (ຕຳແໜ່ງ -10, 10)
                    arte.group.position.set(-10, -0.4 * 0.6, 10);
                    arte.group.rotation.y = 0;
                    arte.leftLeg.rotation.x = -Math.PI / 2;
                    arte.rightLeg.rotation.x = -Math.PI / 2;
                    arte.leftArm.rotation.x = -0.8 + Math.cos(time * 8) * 0.3;
                    arte.rightArm.rotation.x = -0.5 + Math.sin(time * 4) * 0.2;
                    arte.rightArm.rotation.z = 0;
                    toyGroup.rotation.y = Math.sin(time * 2) * 0.3; 
                    tArm.rotation.z = -Math.PI/4 + Math.sin(time * 4) * 0.2;
                } 
                else if (t < 6) {
                    // 2. ລົດຈອດແລ້ວ. ອາເຕ້ລຸກຢືນຂຶ້ນ ແລະ ຫັນໜ້າໄປທາງປະຕູຮົ້ວ
                    carGroup.position.z = -7.5;
                    toyGroup.rotation.y = 0; tArm.rotation.z = -Math.PI/4; // ວາງລົດຈົກລົງ
                    
                    let p = t - 5;
                    arte.group.position.y = (-0.4 * 0.6) + p * (0.4 * 0.6); // ຢືນຂຶ້ນ
                    arte.leftLeg.rotation.x = -Math.PI / 2 * (1 - p);
                    arte.rightLeg.rotation.x = -Math.PI / 2 * (1 - p);
                    arte.leftArm.rotation.x = 0; arte.rightArm.rotation.x = 0;
                    arte.group.rotation.y = Math.PI * p; // ຫັນຫຼັງກັບໄປຫາປະຕູ
                } 
                else if (t < 9) {
                    // 3. ອາເຕ້ແລ່ນໄປທີ່ປະຕູຮົ້ວ (ແລ່ນຈາກ x:-10, z:10 ໄປຫາ x:-11.5, z:-3.5)
                    carGroup.position.z = -7.5;
                    let p = (t - 6) / 3;
                    arte.group.position.x = -10 - p * 1.5; 
                    arte.group.position.z = 10 - p * 13.5; 
                    arte.group.rotation.y = Math.PI - Math.atan2(1.5, 13.5); // ຫັນໜ້າໄປຕາມທາງແລ່ນ
                    
                    // ອະນິເມຊັນແລ່ນ (ແກວ່ງແຂນຂາ)
                    arte.leftLeg.rotation.x = Math.sin(time * 20) * 0.6;
                    arte.rightLeg.rotation.x = -Math.sin(time * 20) * 0.6;
                    arte.leftArm.rotation.x = Math.sin(time * 20) * 0.6;
                    arte.rightArm.rotation.x = -Math.sin(time * 20) * 0.6;
                } 
                else if (t < 11) {
                    // 4. ອາເຕ້ຮອດປະຕູ ເອື້ອມມືກົດເປີດປະຕູ
                    carGroup.position.z = -7.5;
                    arte.group.position.set(-11.5, 0, -3.5);
                    arte.group.rotation.y = Math.PI; // ຫັນໜ້າອອກນອກ
                    arte.leftLeg.rotation.x = 0; arte.rightLeg.rotation.x = 0;
                    arte.leftArm.rotation.x = 0;
                    arte.rightArm.rotation.x = -Math.PI / 2; // ເອື້ອມມືໄປກົດປະຕູ
                    
                    window.setGateState(true); // ປະຕູເປີດອອກ!
                } 
                else if (t < 16) {
                    // 5. ປະຕູເປີດແລ້ວ ປ້າວັນຂັບລົດເຂົ້າມາໃນບ້ານ ອາເຕ້ຢືນໂບກມື
                    let p = (t - 11) / 5;
                    carGroup.position.z = -7.5 + p * 13.5; // ຂັບມາຮອດ z=6
                    
                    arte.rightArm.rotation.x = -Math.PI + Math.sin(time * 10) * 0.3; // ຍົກແຂນໂບກມື
                    arte.rightArm.rotation.z = Math.sin(time * 10) * 0.3;
                } 
                else {
                    // 6. ລົດຈອດໃນບ້ານແລ້ວ ລໍຖ້າເວລາເລີ່ມລູບໃໝ່
                    carGroup.position.z = 6;
                    arte.rightArm.rotation.x = 0; arte.rightArm.rotation.z = 0; // ເອົາມືລົງ
                }
                
                // ລໍ້ລົດໝຸນເວລາລົດແລ່ນ
                if (t < 5 || (t >= 11 && t < 16)) {
                    w1.rotation.x -= 0.2; w2.rotation.x -= 0.2;
                    w3.rotation.x -= 0.2; w4.rotation.x -= 0.2;
                }
            };
            scene.add(arte.group); characters.push(arte);

            // 4. ນໍ້າ (ເດັກຍິງ ຊຸດຟ້າແກ່, ຂີ່ສະເກັດ)
            const nam = createPerson("ນໍ້າ", 0x4682b4, 0x222222, 0.7, false, "nam.jpg");
            nam.group.position.set(-5, 0.1, 8); 
            const skateMat = new THREE.MeshStandardMaterial({color: 0xffffff});
            const sL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 0.25), skateMat); sL.position.set(0, -0.65, 0); nam.leftLeg.add(sL);
            const sR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 0.25), skateMat); sR.position.set(0, -0.65, 0); nam.rightLeg.add(sR);
            let namBaseZ = 8;
            nam.update = (time) => {
                nam.group.position.z = namBaseZ + Math.sin(time) * 3;
                nam.leftLeg.rotation.x = Math.sin(time * 5) * 0.2;
                nam.rightLeg.rotation.x = -Math.sin(time * 5) * 0.2;
                nam.leftArm.rotation.x = Math.sin(time * 5) * 0.3;
                nam.rightArm.rotation.x = -Math.sin(time * 5) * 0.3;
            };
            scene.add(nam.group); characters.push(nam);

            // 5. ຕູ້ເປ້ (ກວດເດີ່ນບ້ານໄປມາ ຕາມແນວແກນ Z)
            const pe = createPerson("ຕູ້ເປ້", 0x222222, 0x111111, 0.9, true, "pe.jpg");
            pe.group.position.set(-16, 0, 5);
            const broom = new THREE.Group();
            const bStick = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.5), new THREE.MeshStandardMaterial({color: 0xcd853f}));
            bStick.position.y = -0.5; broom.add(bStick);
            const bHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x8b4513}));
            bHead.position.y = -1.2; broom.add(bHead);
            broom.position.set(-0.2, 0, 0.3);
            broom.rotation.x = Math.PI / 8;
            pe.group.add(broom);
            
            let peBaseZ = 5;
            pe.update = (time) => {
                // ຍ່າງໄປມາຕາມລວງຍາວເດີ່ນບ້ານ
                let moveZ = Math.sin(time * 0.5) * 5; 
                pe.group.position.z = peBaseZ + moveZ;
                
                // ຫັນໜ້າໄປຕາມທາງທີ່ຍ່າງ
                if (Math.cos(time * 0.5) > 0) {
                    pe.group.rotation.y = 0; // ຍ່າງໄປໜ້າ
                } else {
                    pe.group.rotation.y = Math.PI; // ຍ່າງກັບຫຼັງ
                }

                // ທ່າຍ່າງ ແລະ ກວດຂີ້ເຫຍື້ອ
                pe.leftLeg.rotation.x = Math.sin(time * 5) * 0.4;
                pe.rightLeg.rotation.x = -Math.sin(time * 5) * 0.4;
                const sweep = Math.sin(time * 8) * 0.3;
                pe.body.rotation.y = sweep;
                broom.rotation.y = sweep;
                broom.position.x = -0.2 + sweep * 0.5;
                pe.leftArm.rotation.x = -Math.PI / 6 + sweep * 0.2;
                pe.rightArm.rotation.x = -Math.PI / 4 + sweep * 0.2;
            };
            scene.add(pe.group); characters.push(pe);

            /* STREAMING_CHUNK:Setting up window resize and animation loop... */
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, false);

            const toggleBtn = document.getElementById('toggleGateBtn');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    window.setGateState(!isGateOpen);
                });
            }

            function animate() {
                requestAnimationFrame(animate);
                controls.update(); 
                
                const time = Date.now() * 0.001; 

                const angle = controls.getPolarAngle();
                
                roofGroup.visible = (angle >= 0.8);
                
                const targetToiletRoof = scene.getObjectByName("myToiletRoof");
                if (targetToiletRoof) {
                    targetToiletRoof.visible = (angle >= 0.8);
                }

                if (typeof annotationGroup !== 'undefined') {
                    annotationGroup.visible = (angle < 0.8);
                }

                if (mainGate) {
                    currentGateSlide += (targetGateSlide - currentGateSlide) * 0.05;
                    mainGate.position.x = gateBaseX + currentGateSlide;
                }

                characters.forEach(char => {
                    if(char.update) char.update(time);
                });

                renderer.render(scene, camera);
            }

            animate();
        }
    </script>
</body>
